name: "한전 파워플래너"
version: "0.1.8"
slug: "kepco_power_planner"
description: "한전 파워플래너에서 데이터를 가져오는 애드온입니다."
logo: true
arch:
  - "aarch64"
  - "amd64"
  - "armhf"
  - "armv7"
  - "i386"
init: false
options:
  accounts: []
  update_interval: 30
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
schema:
  accounts:
    - RSA_USER_ID: str
      RSA_USER_PWD: str
  update_interval: "int(1,)"
  mqtt_host: str
  mqtt_port: "int(1,65535)"
  mqtt_username: str
  mqtt_password: str
